<!DOCTYPE html>
<html>
<head>
    <title>Subscription</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <h2>Uni-Eats</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Meals</a></li>
        <li><a href="subscription.html">Subscription</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="account.html" id="accountLink">Account</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Subscribe</h1>
    <p>Choose the perfect plan for you</p>
</section>

<!-- PLANS -->
<section class="features">

    <div class="feature">
        <h2>Weekly Plan</h2>
        <p>5 meals per week</p>
        <p>P70 / week</p>
        <button class="btn" onclick="selectPlan('Weekly Plan - 5 meals (P70/week)')">
            Choose Weekly
        </button>
    </div>

    <div class="feature">
        <h2>Monthly Plan</h2>
        <p>20 meals per month</p>
        <p>P250 / month</p>
        <button class="btn" onclick="selectPlan('Monthly Plan - 20 meals (P250/month)')">
            Choose Monthly
        </button>
    </div>

    <div class="feature">
        <h2>Student Plan</h2>
        <p>3 meals per week</p>
        <p>P50 / week</p>
        <button class="btn" onclick="selectPlan('Student Plan - 3 meals (P50/week)')">
            Choose Student
        </button>
    </div>

</section>

<!-- PAYMENT POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">

        <h2>Payment</h2>
        <p id="selectedPlanText"></p>

        <input type="text" placeholder="Card Number">
        <input type="text" placeholder="Expiry Date (MM/YY)">
        <input type="text" placeholder="CVV">

        <button class="btn" onclick="confirmPayment()">Pay Now</button>
        <button class="btn" onclick="closePopup()">Cancel</button>

    </div>
</div>

</body>
<script src="main.js"></script>
</html>
